<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>greent | 온라인 텍사스 홀덤</title>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{
  --primary:#76b900;--primary-hover:#8ce000;--bg-dark:#000;--bg-light:#1a1a1a;
  --text-white:#fff;--text-gray:#b1b1b1;--felt:#0c3b25;--felt-edge:#062315;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg-dark);color:var(--text-white);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 14px 50px;}
h1{font-size:1.7rem;font-weight:700;margin-bottom:2px;}
h1 .logo{color:var(--primary);text-transform:lowercase;}
.subtitle{color:var(--text-gray);font-size:.85rem;margin-bottom:20px;text-align:center;}

button{font-family:inherit;cursor:pointer;border:none;border-radius:7px;padding:11px 22px;font-size:.9rem;font-weight:700;transition:all .18s;background:#2a2a2a;color:#fff;}
button:hover:not(:disabled){background:#3a3a3a;}
button:disabled{opacity:.35;cursor:not-allowed;}
button.primary{background:var(--primary);color:#000;}
button.primary:hover:not(:disabled){background:var(--primary-hover);}
button.fold{background:#7a2020;}button.fold:hover:not(:disabled){background:#953030;}
button.call{background:#2a5a8a;}button.call:hover:not(:disabled){background:#356fac;}
button.raise{background:var(--primary);color:#000;}button.raise:hover:not(:disabled){background:var(--primary-hover);}
input[type=text]{font-family:inherit;font-size:.95rem;padding:10px 12px;border-radius:7px;border:1px solid #333;background:#111;color:#fff;}

/* Lobby */
.lobby{background:var(--bg-light);border:1px solid #333;border-radius:12px;padding:26px;max-width:460px;width:100%;}
.lobby h2{font-size:1.1rem;margin-bottom:16px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:.8rem;color:var(--text-gray);}
.row{display:flex;gap:8px;}
.row input{flex:1;}
.divider{border-top:1px solid #333;margin:18px 0;text-align:center;position:relative;}
.divider span{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--bg-light);padding:0 10px;color:var(--text-gray);font-size:.78rem;}
.status{font-size:.85rem;color:var(--text-gray);margin-top:10px;min-height:20px;text-align:center;}
.status.err{color:#e66;}
.roomcode{font-size:1.6rem;font-weight:800;letter-spacing:4px;color:var(--primary);text-align:center;background:#111;border-radius:8px;padding:12px;margin:10px 0;}
.plist{list-style:none;margin:12px 0;}
.plist li{padding:8px 12px;background:#111;border-radius:7px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:.9rem;}
.plist .tag{font-size:.68rem;background:var(--primary);color:#000;padding:2px 8px;border-radius:20px;font-weight:700;}
.hide{display:none!important;}

/* Table */
.table{position:relative;width:100%;max-width:820px;background:radial-gradient(ellipse at center,var(--felt) 0%,var(--felt-edge) 100%);border:10px solid #3a2416;border-radius:200px/130px;box-shadow:0 16px 50px rgba(0,0,0,.7),inset 0 0 60px rgba(0,0,0,.4);padding:24px 18px;display:flex;flex-direction:column;gap:14px;}
.opp-area{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;}
.center-row{display:flex;flex-direction:column;align-items:center;gap:8px;min-height:110px;justify-content:center;}
.self-row{display:flex;justify-content:center;}
.seat{background:rgba(0,0,0,.4);border:2px solid transparent;border-radius:12px;padding:9px 11px;min-width:140px;text-align:center;transition:border-color .25s,box-shadow .25s;}
.seat.active{border-color:var(--primary);box-shadow:0 0 16px rgba(118,185,0,.55);}
.seat.folded{opacity:.4;}
.seat.off{opacity:.3;filter:grayscale(1);}
.seat .name{font-weight:700;font-size:.88rem;}
.seat .chips{color:var(--primary);font-size:.8rem;font-weight:600;}
.seat .cards{display:flex;gap:5px;justify-content:center;margin:6px 0 4px;}
.seat .meta{display:flex;gap:4px;justify-content:center;align-items:center;min-height:16px;flex-wrap:wrap;}
.badge{font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:20px;background:#444;}
.badge.d{background:#fff;color:#000;}.badge.sb{background:#4a90d9;}.badge.bb{background:#d94a4a;}.badge.allin{background:var(--primary);color:#000;}.badge.you{background:#e0a020;color:#000;}
.bet-chip{font-size:.7rem;font-weight:700;background:rgba(118,185,0,.25);border:1px solid var(--primary);border-radius:20px;padding:2px 8px;margin-top:4px;display:inline-block;}
.rank-hint{font-size:.7rem;color:var(--primary);margin-top:2px;min-height:13px;}
.card{width:44px;height:63px;border-radius:6px;background:#fff;color:#111;display:flex;flex-direction:column;justify-content:space-between;padding:4px 5px;font-weight:800;box-shadow:0 2px 5px rgba(0,0,0,.4);font-size:.95rem;line-height:1;}
.card .top{align-self:flex-start;}.card .bot{align-self:flex-end;transform:rotate(180deg);}
.card.red{color:#d11;}
.card.back{background:repeating-linear-gradient(45deg,#3a5f00,#3a5f00 6px,#4d7a00 6px,#4d7a00 12px);border:2px solid #76b900;}
.card.small{width:36px;height:52px;font-size:.82rem;}
.card.slot{background:rgba(255,255,255,.06);box-shadow:none;}
.community{display:flex;gap:7px;}
.pot{background:rgba(0,0,0,.5);border:1px solid var(--primary);border-radius:24px;padding:5px 18px;font-weight:700;font-size:.92rem;}
.pot span{color:var(--primary);}
.log{margin-top:14px;min-height:24px;color:var(--text-gray);font-size:.88rem;text-align:center;}
.log .result{color:var(--primary);font-weight:700;}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;margin-top:8px;min-height:48px;}
.raise-panel{display:flex;align-items:center;gap:10px;background:var(--bg-light);padding:8px 14px;border-radius:8px;}
.raise-panel input[type=range]{width:150px;accent-color:var(--primary);}
.raise-panel .amt{font-weight:700;color:var(--primary);min-width:56px;text-align:center;}
.waiting{color:var(--text-gray);font-size:.9rem;}
.hint{color:var(--text-gray);font-size:.78rem;margin-top:16px;text-align:center;max-width:560px;}
</style>
</head>
<body>
  <h1><span class="logo">greent</span> 온라인 홀덤</h1>
  <p class="subtitle">방을 만들어 코드를 공유하거나, 친구 방에 참가하세요 · 2~6인 · P2P(WebRTC)</p>

  <!-- LOBBY -->
  <div class="lobby" id="lobby">
    <div class="field">
      <label>닉네임</label>
      <input type="text" id="nickname" maxlength="12" placeholder="이름 입력">
    </div>

    <div id="lobby-choose">
      <button class="primary" id="btn-create" style="width:100%;margin-bottom:10px;">방 만들기 (호스트)</button>
      <div class="divider"><span>또는</span></div>
      <div class="field">
        <label>방 코드로 참가</label>
        <div class="row">
          <input type="text" id="join-code" maxlength="4" placeholder="예: A3F9" style="text-transform:uppercase;">
          <button id="btn-join">참가</button>
        </div>
      </div>
    </div>

    <div id="lobby-room" class="hide">
      <div style="font-size:.82rem;color:var(--text-gray);text-align:center;">방 코드 (친구에게 공유)</div>
      <div class="roomcode" id="room-code">----</div>
      <ul class="plist" id="player-list"></ul>
      <button class="primary" id="btn-start" style="width:100%;" disabled>게임 시작 (최소 2명)</button>
    </div>

    <div class="status" id="lobby-status"></div>
  </div>

  <!-- GAME -->
  <div id="game" class="hide" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="table" id="table"></div>
    <div class="log" id="log"></div>
    <div class="controls" id="controls"></div>
  </div>

  <p class="hint">호스트의 브라우저가 딜러(서버) 역할을 합니다. 호스트가 창을 닫으면 게임이 종료됩니다. 다른 참가자는 각자 자신의 카드만 볼 수 있습니다.</p>

<script>
(function(){
  "use strict";
  /* ===== shared card / evaluator code ===== */
  const SUITS=['♠','♥','♦','♣'], RED=new Set([1,2]);
  const RANK_STR={11:'J',12:'Q',13:'K',14:'A'};
  const CAT_NAMES=['하이카드','원페어','투페어','트리플','스트레이트','플러시','풀하우스','포카드','스트레이트 플러시'];
  const START_CHIPS=1000, SB=10, BB=20, MAX_PLAYERS=6;
  const rankLabel=r=>RANK_STR[r]||String(r);
  const cardKey=c=>c.rank*4+c.suit;

  function eval5(cards){
    const ranks=cards.map(c=>c.rank).sort((a,b)=>b-a);
    const suits=cards.map(c=>c.suit);
    const flush=suits.every(s=>s===suits[0]);
    const cnt={}; for(const r of ranks) cnt[r]=(cnt[r]||0)+1;
    const groups=Object.keys(cnt).map(r=>[+r,cnt[r]]).sort((a,b)=>b[1]-a[1]||b[0]-a[0]);
    const uniq=[...new Set(ranks)];
    let sh=0;
    if(uniq.length===5){ if(ranks[0]-ranks[4]===4) sh=ranks[0]; else if(ranks[0]===14&&ranks[1]===5&&ranks[4]===2) sh=5; }
    const isS=sh>0; let cat,tb;
    if(isS&&flush){cat=8;tb=[sh];}
    else if(groups[0][1]===4){cat=7;tb=[groups[0][0],groups[1][0]];}
    else if(groups[0][1]===3&&groups[1][1]>=2){cat=6;tb=[groups[0][0],groups[1][0]];}
    else if(flush){cat=5;tb=ranks.slice();}
    else if(isS){cat=4;tb=[sh];}
    else if(groups[0][1]===3){cat=3;tb=[groups[0][0],...groups.slice(1).map(g=>g[0])];}
    else if(groups[0][1]===2&&groups[1][1]===2){cat=2;tb=[groups[0][0],groups[1][0],groups[2][0]];}
    else if(groups[0][1]===2){cat=1;tb=[groups[0][0],...groups.slice(1).map(g=>g[0])];}
    else{cat=0;tb=ranks.slice();}
    while(tb.length<5) tb.push(0);
    let score=cat; for(let i=0;i<5;i++) score=score*15+tb[i];
    return score;
  }
  function bestHand(cards){
    let best=-1; const n=cards.length; if(n<5) return -1;
    const idx=[];
    const combo=(start,pick)=>{ if(pick===0){const s=eval5(idx.map(i=>cards[i]));if(s>best)best=s;return;} for(let i=start;i<=n-pick;i++){idx.push(i);combo(i+1,pick-1);idx.pop();} };
    combo(0,5); return best;
  }
  const catOf=s=>Math.floor(s/759375);

  /* ===== networking ===== */
  const PREFIX='greent-holdem-';
  let peer=null, role=null;         // 'host' | 'client'
  let myName='';
  let hostConn=null;                // client: connection to host
  let participants=[];              // host: [{name, conn, connected, chips, ...game fields}]
  let started=false;

  const $=id=>document.getElementById(id);
  const lobbyStatus=(msg,err)=>{ const s=$('lobby-status'); s.textContent=msg; s.className='status'+(err?' err':''); };

  if(typeof Peer==='undefined'){
    lobbyStatus('네트워크 라이브러리(PeerJS)를 불러오지 못했습니다. 인터넷 연결을 확인하세요.', true);
  }

  function randomCode(){
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let c=''; for(let i=0;i<4;i++) c+=chars[Math.floor(Math.random()*chars.length)];
    return c;
  }

  /* ---- Host: create room ---- */
  $('btn-create').addEventListener('click', ()=>{
    myName=($('nickname').value||'호스트').trim().slice(0,12);
    role='host';
    tryHost();
  });
  function tryHost(){
    const code=randomCode();
    peer=new Peer(PREFIX+code);
    peer.on('open', ()=>{
      $('room-code').textContent=code;
      $('lobby-choose').classList.add('hide');
      $('lobby-room').classList.remove('hide');
      participants=[{name:myName, conn:null, connected:true, chips:START_CHIPS, isHost:true}];
      renderLobby();
      lobbyStatus('방이 생성되었습니다. 친구가 코드로 참가하길 기다리세요.');
    });
    peer.on('connection', conn=>{
      conn.on('open', ()=>{ /* wait for join msg */ });
      conn.on('data', data=>hostHandle(conn, data));
      conn.on('close', ()=>hostDisconnect(conn));
      conn.on('error', ()=>hostDisconnect(conn));
    });
    peer.on('error', err=>{
      if(err.type==='unavailable-id'){ peer.destroy(); tryHost(); }   // code taken, retry
      else lobbyStatus('연결 오류: '+err.type, true);
    });
  }

  /* ---- Client: join room ---- */
  $('btn-join').addEventListener('click', ()=>{
    const code=($('join-code').value||'').trim().toUpperCase();
    if(code.length!==4){ lobbyStatus('4자리 방 코드를 입력하세요.', true); return; }
    myName=($('nickname').value||'플레이어').trim().slice(0,12);
    role='client';
    peer=new Peer();
    peer.on('open', ()=>{
      lobbyStatus('방에 연결 중...');
      hostConn=peer.connect(PREFIX+code, {reliable:true});
      hostConn.on('open', ()=>{ hostConn.send({type:'join', name:myName}); lobbyStatus('연결됨. 호스트가 시작하길 기다리는 중...'); });
      hostConn.on('data', clientHandle);
      hostConn.on('close', ()=>{ lobbyStatus('호스트와의 연결이 끊겼습니다.', true); });
      hostConn.on('error', ()=>{ lobbyStatus('연결 실패. 코드를 확인하세요.', true); });
    });
    peer.on('error', err=>{
      if(err.type==='peer-unavailable') lobbyStatus('해당 방을 찾을 수 없습니다. 코드를 확인하세요.', true);
      else lobbyStatus('연결 오류: '+err.type, true);
    });
  });

  /* ---- Host message handling ---- */
  function hostHandle(conn, data){
    if(data.type==='join'){
      if(started){ conn.send({type:'reject', reason:'게임이 이미 시작되었습니다.'}); return; }
      if(participants.length>=MAX_PLAYERS){ conn.send({type:'reject', reason:'방이 가득 찼습니다.'}); return; }
      participants.push({name:(data.name||'플레이어').slice(0,12), conn, connected:true, chips:START_CHIPS, isHost:false});
      renderLobby(); broadcastLobby();
    } else if(data.type==='action' && started){
      const seat=participants.findIndex(p=>p.conn===conn);
      if(seat>=0) applyAction(seat, data.action, data.amount);
    }
  }
  function hostDisconnect(conn){
    const p=participants.find(x=>x.conn===conn);
    if(!p) return;
    p.connected=false;
    if(!started){
      participants=participants.filter(x=>x.isHost || x.connected);
      renderLobby(); broadcastLobby();
    } else {
      const seat=participants.indexOf(p);
      p.folded=true; p.inHand=false;
      if(!handOver && toAct===seat) applyAction(seat,'fold');
      else broadcastAll();
    }
  }
  function broadcastLobby(){
    const names=participants.map(p=>({name:p.name, isHost:p.isHost, connected:p.connected}));
    participants.forEach((p,i)=>{ if(p.conn && p.conn.open) p.conn.send({type:'lobby', names, you:i}); });
  }

  /* ---- Client message handling ---- */
  function clientHandle(data){
    if(data.type==='reject'){ lobbyStatus(data.reason, true); return; }
    if(data.type==='lobby'){ renderLobbyClient(data); }
    else if(data.type==='state'){ showGame(); render(data); }
  }

  /* ---- Lobby rendering ---- */
  function renderLobby(){
    const ul=$('player-list'); ul.innerHTML='';
    participants.forEach(p=>{
      const li=document.createElement('li');
      li.innerHTML=`<span>${escapeHtml(p.name)}${p.connected?'':' (연결끊김)'}</span>`;
      if(p.isHost){ const t=document.createElement('span'); t.className='tag'; t.textContent='호스트'; li.appendChild(t); }
      ul.appendChild(li);
    });
    const start=$('btn-start');
    const n=participants.filter(p=>p.connected).length;
    start.disabled=n<2;
    start.textContent=n<2?'게임 시작 (최소 2명)':`게임 시작 (${n}명)`;
  }
  function renderLobbyClient(data){
    $('lobby-choose').classList.add('hide');
    $('lobby-room').classList.remove('hide');
    $('room-code').textContent=$('join-code').value.toUpperCase();
    $('btn-start').classList.add('hide');
    const ul=$('player-list'); ul.innerHTML='';
    data.names.forEach(p=>{
      const li=document.createElement('li');
      li.innerHTML=`<span>${escapeHtml(p.name)}${p.connected?'':' (연결끊김)'}</span>`;
      if(p.isHost){ const t=document.createElement('span'); t.className='tag'; t.textContent='호스트'; li.appendChild(t); }
      ul.appendChild(li);
    });
  }
  function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  $('btn-start').addEventListener('click', ()=>{
    if(role!=='host') return;
    participants=participants.filter(p=>p.connected);
    if(participants.length<2) return;
    started=true;
    buttonSeat=participants.length-1;   // so first hand's button rotates to seat 0
    startHand();
  });

  function showGame(){ $('lobby').classList.add('hide'); $('game').classList.remove('hide'); }

  /* ===== HOST-SIDE GAME ENGINE ===== */
  let players, deck, community, phase, currentBet, minRaise, buttonSeat, toAct, reveal, handOver, gameOver, sbSeat, bbSeat, lastMessage;

  function N(){ return players.length; }
  function commit(p, amt){ amt=Math.min(amt,p.chips); p.chips-=amt; p.bet+=amt; p.totalBet+=amt; if(p.chips===0)p.allIn=true; return amt; }
  const potSize=()=>players.reduce((s,p)=>s+p.totalBet,0);
  const inHandCount=()=>players.filter(p=>!p.folded).length;
  function nextInHand(seat){ let i=(seat+1)%N(),g=0; while(g++<N()){ if(players[i].inHand) return i; i=(i+1)%N(); } return seat; }
  function nextInGame(seat){ let i=(seat+1)%N(),g=0; while(g++<N()){ if(players[i].chips>0) return i; i=(i+1)%N(); } return seat; }

  function makeDeck(){
    const d=[]; for(let s=0;s<4;s++) for(let r=2;r<=14;r++) d.push({rank:r,suit:s});
    for(let i=d.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [d[i],d[j]]=[d[j],d[i]]; }
    return d;
  }

  function startHand(){
    players=participants;   // same objects; add game fields
    if(players.filter(p=>p.chips>0).length<2){ declareChampion(); return; }
    deck=makeDeck(); community=[]; phase='preflop'; reveal=false; handOver=false; gameOver=false;
    currentBet=BB; minRaise=BB;
    players.forEach(p=>{ p.inHand=p.connected&&p.chips>0; p.folded=!p.inHand; p.allIn=false; p.bet=0; p.totalBet=0; p.hasActed=false; p.hole=[]; p.handScore=0; });
    buttonSeat=nextInGame(buttonSeat);
    for(let k=0;k<2;k++) players.forEach(p=>{ if(p.inHand) p.hole.push(deck.pop()); });
    const ig=players.filter(p=>p.inHand).length;
    let firstPre;
    if(ig===2){ sbSeat=buttonSeat; bbSeat=nextInHand(buttonSeat); firstPre=sbSeat; }
    else { sbSeat=nextInHand(buttonSeat); bbSeat=nextInHand(sbSeat); firstPre=nextInHand(bbSeat); }
    commit(players[sbSeat], SB); commit(players[bbSeat], BB);
    currentBet=BB; minRaise=BB; toAct=firstPre;
    lastMessage=`새 핸드 — 딜러: ${players[buttonSeat].name}`;
    proceed();
  }
  function firstToActPostflop(){ const ig=players.filter(p=>p.inHand).length; return ig===2?bbSeat:nextInHand(buttonSeat); }
  function dealCommunity(n){ for(let i=0;i<n;i++) community.push(deck.pop()); }

  function advancePhase(){
    if(phase==='preflop'){ phase='flop'; dealCommunity(3); }
    else if(phase==='flop'){ phase='turn'; dealCommunity(1); }
    else if(phase==='turn'){ phase='river'; dealCommunity(1); }
    else { showdown(); return; }
    players.forEach(p=>{ p.bet=0; p.hasActed=false; });
    currentBet=0; minRaise=BB; toAct=firstToActPostflop();
    lastMessage={preflop:'프리플랍',flop:'플랍',turn:'턴',river:'리버'}[phase];
    proceed();
  }
  function roundComplete(){
    const elig=players.filter(p=>!p.folded&&!p.allIn&&p.chips>0);
    if(elig.length===0) return true;
    return elig.every(p=>p.hasActed&&p.bet===currentBet);
  }
  function proceed(){
    if(inHandCount()===1){ broadcastAll(); setTimeout(awardToLast,800); return; }
    if(roundComplete()){ broadcastAll(); setTimeout(advancePhase,950); return; }
    let g=0;
    while(g++<=N()*2){
      const p=players[toAct];
      const must=!p.folded&&!p.allIn&&p.chips>0&&!(p.hasActed&&p.bet===currentBet);
      if(must) break;
      toAct=(toAct+1)%N();
    }
    broadcastAll();
  }

  function applyAction(seat, action, amount){
    if(!started||handOver) return;
    if(seat!==toAct) return;
    const p=players[seat];
    if(action==='fold'){ p.folded=true; lastMessage=`${p.name} 폴드`; }
    else if(action==='check'){ if(currentBet-p.bet!==0) return; lastMessage=`${p.name} 체크`; }
    else if(action==='call'){ const a=commit(p,currentBet-p.bet); lastMessage=`${p.name} 콜 (${a}${p.allIn?', 올인':''})`; }
    else if(action==='raise'){
      const maxTo=p.bet+p.chips, minTo=Math.min(currentBet+minRaise,maxTo);
      let target=Math.round(amount||0); if(target<minTo) target=minTo; if(target>maxTo) target=maxTo;
      const prev=currentBet; commit(p, target-p.bet);
      if(p.bet>prev){ const rs=p.bet-prev; if(rs>=minRaise) minRaise=rs; currentBet=p.bet; players.forEach(o=>{ if(o!==p&&!o.folded&&!o.allIn) o.hasActed=false; }); }
      lastMessage=`${p.name} ${prev===0?'벳':'레이즈'} → ${p.bet}${p.allIn?' (올인)':''}`;
    } else return;
    p.hasActed=true;
    proceed();
  }

  function showdown(){
    reveal=true;
    players.forEach(p=>{ if(!p.folded) p.handScore=bestHand([...p.hole,...community]); });
    distributePots();
  }
  function distributePots(){
    const rem=players.map((p,i)=>({i,amt:p.totalBet,folded:p.folded}));
    const pots=[];
    while(true){
      const pos=rem.filter(r=>r.amt>0); if(pos.length===0) break;
      const min=Math.min(...pos.map(r=>r.amt)); let amount=0; const elig=[];
      for(const r of rem){ if(r.amt>0){ amount+=min; r.amt-=min; if(!r.folded) elig.push(r.i); } }
      pots.push({amount,elig});
    }
    const won={};
    for(const pot of pots){
      if(!pot.elig.length) continue;
      let best=-1,winners=[];
      for(const i of pot.elig){ const sc=players[i].handScore; if(sc>best){best=sc;winners=[i];} else if(sc===best) winners.push(i); }
      const share=Math.floor(pot.amount/winners.length); const left=pot.amount-share*winners.length;
      winners.forEach((w,k)=>{ players[w].chips+=share+(k===0?left:0); won[w]=(won[w]||0)+share+(k===0?left:0); });
    }
    const msg=Object.keys(won).map(i=>`${players[i].name} +${won[i]} (${CAT_NAMES[catOf(players[i].handScore)]})`).join('  ·  ');
    endHand(msg);
  }
  function awardToLast(){
    const w=players.find(p=>!p.folded); const pot=potSize(); w.chips+=pot;
    endHand(`${w.name} 승리 (+${pot})`);
  }
  function endHand(msg){
    handOver=true; lastMessage=msg;
    broadcastAll(true);
    if(players.filter(p=>p.chips>0).length<2){ setTimeout(declareChampion,1500); return; }
    setTimeout(()=>{ if(role==='host') startHand(); }, 4500);   // auto next hand
  }
  function declareChampion(){
    handOver=true; gameOver=true;
    const champ=players.reduce((a,b)=>a.chips>=b.chips?a:b);
    lastMessage=`🏆 게임 종료 — 우승: ${champ.name} (${champ.chips} 칩)`;
    broadcastAll(true);
  }

  /* ---- build personalized state & broadcast ---- */
  function legalFor(p){
    const callAmount=Math.max(0,currentBet-p.bet);
    const maxTo=p.bet+p.chips, minTo=Math.min(currentBet+minRaise,maxTo);
    return { canFold:true, canCheck:callAmount===0, callAmount:Math.min(callAmount,p.chips),
             minRaiseTo:minTo, maxRaiseTo:maxTo, canRaise:maxTo>currentBet };
  }
  function buildState(viewer){
    return {
      type:'state', you:viewer, buttonSeat, sbSeat, bbSeat, toAct, phase,
      pot:potSize(), currentBet, minRaise, handOver, gameOver, reveal, message:lastMessage,
      community: community.slice(),
      players: players.map((p,i)=>{
        let hole;
        if(!p.inHand) hole=[];
        else if(i===viewer || (reveal && !p.folded)) hole=p.hole.slice();
        else hole=[null,null];
        return { name:p.name, chips:p.chips, bet:p.bet, folded:p.folded, allIn:p.allIn,
                 inHand:p.inHand, connected:p.connected!==false, hole,
                 handName:(reveal&&!p.folded&&p.hole.length)?CAT_NAMES[catOf(p.handScore)]:null };
      }),
      legal: (viewer===toAct && !handOver && !gameOver) ? legalFor(players[viewer]) : null
    };
  }
  function broadcastAll(){
    render(buildState(0));   // host is seat 0
    for(let i=1;i<players.length;i++){ const p=players[i]; if(p.conn && p.conn.open) p.conn.send(buildState(i)); }
  }

  /* ===== SHARED RENDERING (host + clients) ===== */
  function act(action, amount){
    if(role==='host') applyAction(0, action, amount);
    else if(hostConn && hostConn.open) hostConn.send({type:'action', action, amount});
    $('controls').innerHTML='<span class="waiting">처리 중...</span>';
  }

  function cardEl(card, small){
    if(!card){ const b=document.createElement('div'); b.className='card back'+(small?' small':''); return b; }
    const d=document.createElement('div'); d.className='card'+(small?' small':'')+(RED.has(card.suit)?' red':'');
    const t=document.createElement('span'); t.className='top'; t.textContent=rankLabel(card.rank)+SUITS[card.suit];
    const b=document.createElement('span'); b.className='bot'; b.textContent=rankLabel(card.rank)+SUITS[card.suit];
    d.appendChild(t); d.appendChild(b); return d;
  }
  function badge(txt,cls){ const b=document.createElement('span'); b.className='badge '+cls; b.textContent=txt; return b; }

  function seatEl(s, i, state){
    const seat=document.createElement('div');
    seat.className='seat'+(s.folded?' folded':'')+(!s.connected?' off':'')+(state.toAct===i&&!state.handOver?' active':'');
    const name=document.createElement('div'); name.className='name'; name.textContent=s.name+(i===state.you?' (나)':'');
    const chips=document.createElement('div'); chips.className='chips'; chips.textContent='칩 '+s.chips;
    const cards=document.createElement('div'); cards.className='cards';
    if(s.inHand) s.hole.forEach(c=>cards.appendChild(cardEl(c,true)));
    const meta=document.createElement('div'); meta.className='meta';
    if(i===state.buttonSeat) meta.appendChild(badge('D','d'));
    if(i===state.sbSeat) meta.appendChild(badge('SB','sb'));
    if(i===state.bbSeat) meta.appendChild(badge('BB','bb'));
    if(s.allIn) meta.appendChild(badge('ALL-IN','allin'));
    seat.appendChild(name); seat.appendChild(chips); seat.appendChild(cards); seat.appendChild(meta);
    if(s.bet>0){ const bc=document.createElement('div'); bc.className='bet-chip'; bc.textContent='벳 '+s.bet; seat.appendChild(bc); }
    if(s.handName){ const h=document.createElement('div'); h.className='rank-hint'; h.textContent=s.handName; seat.appendChild(h); }
    else if(i===state.you && s.inHand && state.community.length>0){
      const h=document.createElement('div'); h.className='rank-hint';
      const sc=bestHand(s.hole.filter(Boolean).concat(state.community));
      h.textContent=sc>=0?CAT_NAMES[catOf(sc)]:''; seat.appendChild(h);
    }
    return seat;
  }

  function render(state){
    const table=$('table'); table.innerHTML='';
    const opp=document.createElement('div'); opp.className='opp-area';
    state.players.forEach((s,i)=>{ if(i!==state.you) opp.appendChild(seatEl(s,i,state)); });
    table.appendChild(opp);

    const center=document.createElement('div'); center.className='center-row';
    const pot=document.createElement('div'); pot.className='pot'; pot.innerHTML='팟 <span>'+state.pot+'</span>';
    center.appendChild(pot);
    const comm=document.createElement('div'); comm.className='community';
    state.community.forEach(c=>comm.appendChild(cardEl(c)));
    for(let k=state.community.length;k<5;k++){ const ph=document.createElement('div'); ph.className='card slot'; comm.appendChild(ph); }
    center.appendChild(comm);
    table.appendChild(center);

    const self=document.createElement('div'); self.className='self-row';
    self.appendChild(seatEl(state.players[state.you], state.you, state));
    table.appendChild(self);

    const log=$('log'); log.innerHTML = state.handOver ? '<span class="result">'+escapeHtml(state.message||'')+'</span>' : escapeHtml(state.message||'');

    renderControls(state);
  }

  function renderControls(state){
    const c=$('controls'); c.innerHTML='';
    if(state.gameOver){ c.innerHTML='<span class="waiting">게임이 종료되었습니다.</span>'; return; }
    if(state.handOver){ c.innerHTML='<span class="waiting">다음 핸드를 준비 중...</span>'; return; }
    if(!state.legal){
      const who=state.players[state.toAct];
      c.innerHTML='<span class="waiting">'+(who?escapeHtml(who.name)+'의 차례를 기다리는 중...':'대기 중...')+'</span>';
      return;
    }
    const L=state.legal, me=state.players[state.you];

    const fold=document.createElement('button'); fold.className='fold'; fold.textContent='폴드';
    fold.onclick=()=>act('fold'); c.appendChild(fold);

    const cc=document.createElement('button'); cc.className='call';
    if(L.canCheck){ cc.textContent='체크'; cc.onclick=()=>act('check'); }
    else{ cc.textContent='콜 '+L.callAmount; cc.onclick=()=>act('call'); }
    c.appendChild(cc);

    if(L.canRaise){
      const panel=document.createElement('div'); panel.className='raise-panel';
      const range=document.createElement('input'); range.type='range';
      range.min=L.minRaiseTo; range.max=L.maxRaiseTo; range.step=SB; range.value=L.minRaiseTo;
      const amt=document.createElement('span'); amt.className='amt'; amt.textContent=range.value;
      const go=document.createElement('button'); go.className='raise';
      const relabel=()=>{ amt.textContent=range.value; go.textContent=(+range.value>=L.maxRaiseTo)?'올인':(state.currentBet===0?'벳':'레이즈'); };
      range.oninput=relabel; relabel();
      go.onclick=()=>act('raise', +range.value);
      panel.appendChild(range); panel.appendChild(amt); panel.appendChild(go);
      c.appendChild(panel);
    }
  }

})();
</script>
